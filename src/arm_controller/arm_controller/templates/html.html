<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@300;400&display=swap');

        :root {
            --bg-color: #fce4ec;
            --rose-color: #e91e63;
            --rose-dark: #c2185b;
            --stem-color: #4caf50;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.9);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            background-color: #ffdde1;
            background-image: linear-gradient(0deg, #ffdde1 0%, #ee9ca7 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
        }

        /* Floating background particles */
        .bg-particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: floatUp linear infinite;
            z-index: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .container {
            position: relative;
            width: 90%;
            max-width: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.05);
            animation: popIn 1s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            z-index: 10;
            transform: scale(0);
        }

        @keyframes popIn {
            0% { transform: scale(0) translateY(50px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: var(--rose-dark);
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        p {
            color: #555;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* --- THE ROSE CSS ART --- */
        .rose-container {
            position: relative;
            width: 100px;
            height: 200px;
            margin: 0 auto 20px;
            cursor: pointer;
        }

        .flower {
            position: relative;
            width: 60px;
            height: 60px;
            background: var(--rose-color);
            border-radius: 50% 50% 5px 50%;
            transform: rotate(45deg);
            margin: 0 auto;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.1);
            animation: bloom 2s ease-out forwards;
            z-index: 2;
        }

        /* Petals inside */
        .flower::before {
            content: '';
            position: absolute;
            width: 80%;
            height: 80%;
            background: var(--rose-dark);
            border-radius: 50% 50% 0 50%;
            bottom: 5px;
            right: 5px;
            opacity: 0.8;
        }

        .petal {
            position: absolute;
            z-index: 1;
            background: var(--rose-color);
            border-radius: 50%;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            opacity: 0; /* Hidden initially for bloom effect */
            animation: openPetal 2s 0.5s ease-out forwards;
        }

        .petal:nth-child(1) { width: 50px; height: 50px; top: -10px; left: -10px; border-radius: 50% 50% 0 50%; }
        .petal:nth-child(2) { width: 50px; height: 50px; top: -10px; right: -10px; border-radius: 50% 50% 50% 0; }
        .petal:nth-child(3) { width: 50px; height: 50px; bottom: -5px; left: -15px; border-radius: 50% 0 50% 50%; }
        .petal:nth-child(4) { width: 50px; height: 50px; bottom: -5px; right: -15px; border-radius: 0 50% 50% 50%; }

        @keyframes bloom {
            0% { transform: scale(0) rotate(0); }
            100% { transform: scale(1) rotate(45deg); }
        }

        @keyframes openPetal {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Stem and Leaves */
        .stem {
            position: absolute;
            width: 4px;
            height: 120px;
            background: var(--stem-color);
            left: 50%;
            transform: translateX(-50%);
            top: 55px;
            border-radius: 2px;
            z-index: 0;
            animation: growStem 2s ease-out forwards;
            transform-origin: top;
        }

        .leaf {
            position: absolute;
            width: 30px;
            height: 15px;
            background: var(--stem-color);
            border-radius: 0 50% 0 50%;
            top: 40px;
            opacity: 0;
            animation: growLeaf 1s 1.5s ease-out forwards;
        }

        .leaf.left {
            left: -30px;
            transform: rotate(-10deg);
        }

        .leaf.right {
            right: -30px;
            transform: rotate(190deg) scaleX(-1);
        }

        @keyframes growStem {
            0% { height: 0; }
            100% { height: 120px; }
        }

        @keyframes growLeaf {
            0% { transform: scale(0); opacity: 0; }
            100% { opacity: 1; } /* Rotation handled in class specific rules would need to be re-applied if not careful, but scale works fine */
        }
        
        /* Fix for leaf rotation keyframe conflict */
        .leaf.left { animation: growLeftLeaf 1s 1.5s ease-out forwards; }
        .leaf.right { animation: growRightLeaf 1s 1.5s ease-out forwards; }

        @keyframes growLeftLeaf {
            0% { transform: scale(0) rotate(0); opacity: 0; }
            100% { transform: scale(1) rotate(-20deg); opacity: 1; }
        }
        @keyframes growRightLeaf {
            0% { transform: scale(0) rotate(0); opacity: 0; }
            100% { transform: scale(1) rotate(200deg); opacity: 1; }
        }

        /* Message */
        .message-box {
            margin-top: 20px;
            opacity: 0;
            animation: fadeIn 1s 2s ease-out forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        button {
            margin-top: 15px;
            padding: 10px 30px;
            border: none;
            border-radius: 50px;
            background: var(--rose-color);
            color: white;
            font-family: 'Quicksand', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(233, 30, 99, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(233, 30, 99, 0.6);
            background: var(--rose-dark);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Heart rain on click */
        .heart {
            position: fixed;
            color: var(--rose-color);
            font-size: 20px;
            pointer-events: none;
            animation: fall linear forwards;
            z-index: 100;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }

    </style>
</head>
<body>

    <!-- Background Animation Elements -->
    <div id="bg-particles"></div>

    <div class="container">
        <div class="rose-container" onclick="createHearts()">
            <div class="flower"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="stem">
                <div class="leaf left"></div>
                <div class="leaf right"></div>
            </div>
        </div>

        <div class="message-box">
            <h1>I'm Sorry</h1>
            <p>
                I never meant to hurt you. <br>
                Please forgive me. 
                You mean everything to me.
            </p>
            <button onclick="acceptApology()">Forgive Me?</button>
        </div>
    </div>

    <script>
        // Create ambient background particles
        const bgContainer = document.getElementById('bg-particles');
        const particleCount = 20;

        for(let i=0; i<particleCount; i++) {
            const span = document.createElement('span');
            span.className = 'bg-particle';
            const size = Math.random() * 20 + 5;
            span.style.width = `${size}px`;
            span.style.height = `${size}px`;
            span.style.left = `${Math.random() * 100}vw`;
            span.style.animationDuration = `${Math.random() * 5 + 5}s`;
            span.style.animationDelay = `${Math.random() * 5}s`;
            bgContainer.appendChild(span);
        }

        // Function to create falling hearts
        function createHearts() {
            for(let i=0; i<15; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.innerHTML = '❤';
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.top = '-50px';
                    heart.style.fontSize = Math.random() * 20 + 20 + 'px';
                    heart.style.animationDuration = Math.random() * 2 + 3 + 's';
                    document.body.appendChild(heart);
                    
                    setTimeout(() => {
                        heart.remove();
                    }, 5000);
                }, i * 100);
            }
        }

        function acceptApology() {
            createHearts();
            const btn = document.querySelector('button');
            btn.innerHTML = "Thank You ❤";
            btn.style.background = "#4caf50";
            
            const msg = document.querySelector('p');
            msg.innerHTML = "I promise to do better.<br>I love you.";
        }
    </script>
</body>
</html>
